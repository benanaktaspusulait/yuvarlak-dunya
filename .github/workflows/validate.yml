name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate Naming
        run: bash scripts/validate-naming.sh
      
      - name: Validate Continuity
        run: python3 scripts/validate-continuity.py
      
      - name: Lint Prompts
        run: python3 scripts/lint-prompts.py
